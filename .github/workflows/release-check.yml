name: Check Bitcoin Core Releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check_releases:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Get official releases and current releases
        id: versions
        env:
          # Authenticate the GitHub API reads. Unauthenticated calls share a
          # 60 req/h-per-IP budget on shared runners and intermittently return
          # a non-JSON error body, which made `jq` fail ("Invalid numeric
          # literal" → "Can't fetch releases!"). The default GITHUB_TOKEN's
          # contents:read scope is enough to read public release lists.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OFFICIAL_VERSIONS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/bitcoin/bitcoin/releases?per_page=100" \
            | jq -r '.[].tag_name' \
            | grep -E '^v(2[8-9]|[3-9][0-9])\.[0-9]+(\.[0-9]+)?$' \
            | grep -vE 'rc[0-9]+$' \
            | sed 's/^v//' \
            | sort -V \
            | tr '\n' ' ')

          LATEST_VERSION=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/bitcoin/bitcoin/releases/latest" \
            | jq -r '.tag_name' \
            | sed 's/^v//')

          CURRENT_VERSIONS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
            | jq -r '.[].tag_name' \
            | sed 's/^v//' \
            | sort -V \
            | tr '\n' ' ')

          if [ -z "$OFFICIAL_VERSIONS" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Can't fetch releases!"
            exit 1
          fi

          {
            echo "OFFICIAL_VERSIONS=$OFFICIAL_VERSIONS"
            echo "LATEST_VERSION=$LATEST_VERSION"
            echo "CURRENT_VERSIONS=$CURRENT_VERSIONS"
          } >> "$GITHUB_OUTPUT"

      - name: Determine versions to build
        id: determine_builds
        env:
          OFFICIAL_VERSIONS: ${{ steps.versions.outputs.OFFICIAL_VERSIONS }}
          CURRENT_VERSIONS: ${{ steps.versions.outputs.CURRENT_VERSIONS }}
        run: |
          VERSIONS_TO_BUILD=""
          for v in $OFFICIAL_VERSIONS; do
            if [[ " $CURRENT_VERSIONS " != *" $v "* ]]; then
              VERSIONS_TO_BUILD="$VERSIONS_TO_BUILD $v"
            fi
          done

          if [ -z "$VERSIONS_TO_BUILD" ]; then
            echo "No new versions to build."
            exit 0
          fi

          echo "VERSIONS_TO_BUILD=$VERSIONS_TO_BUILD" >> "$GITHUB_OUTPUT"

      - name: Trigger builds for new versions
        env:
          VERSIONS_TO_BUILD: ${{ steps.determine_builds.outputs.VERSIONS_TO_BUILD }}
          LATEST_VERSION: ${{ steps.versions.outputs.LATEST_VERSION }}
        run: |
          for v in $VERSIONS_TO_BUILD; do
            if [ "$v" == "$LATEST_VERSION" ]; then
              LATEST_FLAG=true
            else
              LATEST_FLAG=false
            fi

            echo "Triggering build for version $v (LATEST=$LATEST_FLAG)"
            curl -sS --fail-with-body -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-docker.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{\"VERSION\":\"v$v\",\"LATEST\":\"$LATEST_FLAG\"}}"
          done

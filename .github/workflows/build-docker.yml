name: Build & Push Bitcoind Docker Image

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Bitcoin Core version (e.g., v30.0)'
        required: true
      LATEST:
        description: 'Set to true to tag this image as latest'
        required: true
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set version variables
        id: versions
        env:
          VERSION: ${{ github.event.inputs.VERSION }}
          LATEST: ${{ github.event.inputs.LATEST }}
        run: |
          SHORT_VERSION="${VERSION#v}"
          MAJOR_VERSION="${SHORT_VERSION%%.*}"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "LATEST=$LATEST" >> $GITHUB_OUTPUT
          echo "SHORT_VERSION=$SHORT_VERSION" >> $GITHUB_OUTPUT
          echo "MAJOR_VERSION=$MAJOR_VERSION" >> $GITHUB_OUTPUT

          ASSET="bitcoin-${SHORT_VERSION}-x86_64-linux-gnu.tar.gz"
          echo "ASSET=$ASSET" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg curl xz-utils tar coreutils

      - name: Download Bitcoin Core binaries
        env:
          SHORT_VERSION: ${{ steps.versions.outputs.SHORT_VERSION }}
          ASSET: ${{ steps.versions.outputs.ASSET }}
        run: |
          BASE="https://bitcoincore.org/bin/bitcoin-core-${SHORT_VERSION}"
          curl -fSL -O "${BASE}/${ASSET}"
          curl -fSL -O "${BASE}/SHA256SUMS"
          curl -fSL -O "${BASE}/SHA256SUMS.asc"

      - name: Import builder keys
        run: |
          git clone --depth 1 https://github.com/bitcoin-core/guix.sigs.git
          gpg --import guix.sigs/builder-keys/* 2>&1
          IMPORTED=$(gpg --list-keys 2>/dev/null | grep -c "^pub" || echo 0)
          if [ "$IMPORTED" -eq 0 ]; then
            echo "ERROR: No GPG keys imported. Cannot verify signatures."
            exit 1
          fi
          echo "Imported $IMPORTED GPG builder key(s)."

      - name: Verify signatures
        run: |
          # gpg returns non-zero when some signatures use unknown keys (expected);
          # capture output unconditionally and check the valid count below.
          gpg --verify SHA256SUMS.asc SHA256SUMS 2>&1 | tee gpg_verify_output.txt || true
          VALID_SIGS=$(grep -c "^gpg: Good signature" gpg_verify_output.txt || echo 0)
          if [ "$VALID_SIGS" -lt 3 ]; then
            echo "ERROR: Only $VALID_SIGS valid signature(s) found. At least 3 required."
            exit 1
          fi
          echo "$VALID_SIGS valid signatures verified."

      - name: Verify checksum
        env:
          ASSET: ${{ steps.versions.outputs.ASSET }}
        run: |
          grep "$ASSET" SHA256SUMS | sha256sum -c -

      - name: Extract binaries
        env:
          ASSET: ${{ steps.versions.outputs.ASSET }}
        run: |
          mkdir -p bin
          tar -xzf "$ASSET" --strip-components=2 -C bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.SHORT_VERSION }}
            ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.MAJOR_VERSION }}-stable
            ${{ steps.versions.outputs.LATEST == 'true' && format('ghcr.io/{0}:latest', github.repository) || '' }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.versions.outputs.VERSION }}
          name: "Bitcoin Core Docker ${{ steps.versions.outputs.VERSION }}"
          body: |
            This Docker image is built from the official Bitcoin Core source for version **${{ steps.versions.outputs.VERSION }}**.

            **Official Bitcoin Core Release Notes**
            https://bitcoincore.org/en/releases/${{ steps.versions.outputs.SHORT_VERSION }}/

            ---
            Built automatically from upstream Bitcoin Core releases.

name: ci

# Fast PR gate for the wrapper itself: the entrypoint shell logic and the
# Dockerfile. The publish workflow (build-docker.yml) calls this via
# workflow_call so no image is released without green checks. There is no
# `push` trigger — pushes to main land via merged PRs, which already ran here.
on:
  pull_request:
  workflow_call:

# Least privilege: only read the repo. The publishing job in build-docker.yml
# grants its own write scopes on its own job, never through this file.
permissions:
  contents: read

jobs:
  lint:
    # Static gates: ShellCheck on the entrypoint, Hadolint on the Dockerfile,
    # actionlint on the workflows. No image build, so this is fast feedback.
    # Hadolint runs as a SHA-pinned action (ghcr-based, Dependabot-tracked).
    # actionlint runs as a pinned release binary instead: the reviewdog action
    # bundles an outdated actionlint that rejects valid reusable-workflow syntax
    # (workflow_call / job-level `uses:`), so it can't lint our own workflows.
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.7
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ShellCheck (entrypoint)
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: shellcheck scripts/entrypoint.sh

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: actionlint (workflows)
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          ./actionlint -color

  smoke:
    # Build the image with the *real* Bitcoin Core binaries and boot the actual
    # daemon in regtest, the way an Unraid user would (PUID/PGID 99:100). This
    # proves end to end that the published image is runnable: the entrypoint
    # validates PUID/PGID, creates and chowns the data dir, drops privileges via
    # gosu, and the real bitcoind comes up and answers RPC. (build-docker.yml
    # still does the full checksum + Guix-signature verification at release
    # time; here we checksum-verify the download — enough for a boot smoke.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve Bitcoin Core version to build
        id: btc
        env:
          GH_TOKEN: ${{ github.token }}
          # Fallback for the very first build, before this repo has any release.
          FALLBACK_VERSION: v31.0
        run: |
          # Build the last version THIS repo released — i.e. the latest
          # known-good Bitcoin Core tag. release-check.yml keeps that in sync
          # with upstream daily, so the smoke auto-tracks new releases without a
          # manual bump.
          tag=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // empty')
          if [ -z "$tag" ]; then tag="$FALLBACK_VERSION"; fi
          short="${tag#v}"
          echo "Building Bitcoin Core $short"
          echo "short=$short" >> "$GITHUB_OUTPUT"

      - name: Download and verify Bitcoin Core binaries
        env:
          SHORT_VERSION: ${{ steps.btc.outputs.short }}
        run: |
          base="https://bitcoincore.org/bin/bitcoin-core-${SHORT_VERSION}"
          asset="bitcoin-${SHORT_VERSION}-x86_64-linux-gnu.tar.gz"
          curl -fSL -O "${base}/${asset}"
          curl -fSL -O "${base}/SHA256SUMS"
          grep "  ${asset}\$" SHA256SUMS | sha256sum -c -
          mkdir -p bin
          tar -xzf "$asset" --strip-components=2 -C bin

      - name: Build image
        run: docker build -t bitcoind:ci .

      - name: Boot the real daemon (regtest, PUID/PGID 99:100)
        run: |
          mkdir -p data
          docker run -d --name btc \
            -e PUID=99 -e PGID=100 \
            -v "$PWD/data:/home/bitcoin/.bitcoin" \
            bitcoind:ci \
            -regtest -server -rpcuser=ci -rpcpassword=ci -fallbackfee=0.0002

      - name: Wait for RPC and assert the chain is up
        run: |
          for _ in $(seq 1 30); do
            if docker exec btc bitcoin-cli -regtest -rpcuser=ci -rpcpassword=ci \
                 getblockchaininfo > info.json 2>/dev/null; then
              cat info.json
              chain=$(jq -r '.chain' info.json)
              [ "$chain" = "regtest" ] || { echo "unexpected chain: $chain"; exit 1; }
              echo "real bitcoind is up on regtest"
              exit 0
            fi
            sleep 2
          done
          echo "bitcoind RPC never came up"; docker logs btc; exit 1

      - name: Assert data dir ownership (gosu drop)
        run: |
          owner=$(stat -c '%u:%g' data)
          echo "data dir owner: $owner"
          [ "$owner" = "99:100" ] || { echo "expected 99:100"; docker logs btc; exit 1; }
          # The regtest subdir is created by the daemon *after* the drop, so its
          # owner proves bitcoind itself runs as the dropped user, not just the
          # entrypoint's chown.
          sub=$(stat -c '%u:%g' data/regtest)
          echo "regtest dir owner: $sub"
          [ "$sub" = "99:100" ] || { echo "daemon did not run as 99:100"; exit 1; }

      - name: Assert PUID/PGID validation rejects non-integers
        run: |
          # The entrypoint must refuse non-numeric PUID/PGID before doing any
          # privileged work — a regression here would silently run as root.
          if docker run --rm -e PUID=abc bitcoind:ci -version; then
            echo "entrypoint accepted a non-integer PUID"; exit 1
          fi
          echo "non-integer PUID correctly rejected"

      - name: Cleanup
        if: always()
        run: docker rm -f btc || true
